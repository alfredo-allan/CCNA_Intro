    <!-- SCRIPTS de Quiz (duas funções específicas para cada pergunta, mantendo o padrão de ID) -->
    <script>
      // Função para o quiz principal sobre ARP
      function checkQuizARP() {
        const radios = document.getElementsByName('quizModelo')
        let selected = null
        for (let r of radios) {
          if (r.checked) {
            selected = r.value
            break
          }
        }
        const divResp = document.getElementById('quizRespostaARP')
        divResp.style.display = 'block'
        if (selected === 'correta') {
          divResp.className = 'quiz-answer correct'
          divResp.innerHTML =
          '<i class="fas fa-check-circle me-2"></i> Correto! O ARP (Address Resolution Protocol) resolve endereços IPv4 em endereços MAC, essencial para comunicação dentro da mesma rede local.'
        } else if (selected === 'errada') {
          divResp.className = 'quiz-answer incorrect'
          divResp.innerHTML =
            '<i class="fas fa-times-circle me-2"></i> Incorreto. ARP não realiza roteamento nem controle de multicast; sua única função é mapear endereços lógicos (IP) para físicos (MAC).'
        } else {
          divResp.className = 'quiz-answer incorrect'
          divResp.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Selecione uma resposta antes de verificar.'
        }
      }

      // Função para o quiz sobre camada OSI
      function checkQuizOSI() {
        const radiosOsi = document.getElementsByName('quizOsi')
        let selectedVal = null
        for (let r of radiosOsi) {
          if (r.checked) {
            selectedVal = r.value
            break
          }
        }
        const divOsi = document.getElementById('quizRespostaOSI')
        divOsi.style.display = 'block'
        if (selectedVal === 'correta') {
          divOsi.className = 'quiz-answer correct'
          divOsi.innerHTML =
            '<i class="fas fa-check-circle me-2"></i> Correto! A camada de rede (camada 3) é responsável pelo endereçamento lógico (IP) e pelo roteamento dos pacotes entre diferentes redes.'
        } else if (selectedVal === 'errada') {
          divOsi.className = 'quiz-answer incorrect'
          divOsi.innerHTML =
            '<i class="fas fa-times-circle me-2"></i> Incorreto. A camada de rede (Layer 3) tem essa função, enquanto a camada de transporte lida com segmentação e portas.'
        } else {
          divOsi.className = 'quiz-answer incorrect'
          divOsi.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> Por favor, selecione uma alternativa.'
        }
      }
    </script>
